name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      # Initialises vendor/saifdocs submodule.
      # If the submodule is not initialised, sync-docs.ts exits non-zero and the build fails.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('web/package-lock.json') }}-${{ hashFiles('web/src/**', 'docs/**', 'vendor/saifdocs/docs/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('web/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${{ vars.NEXT_PUBLIC_PLAUSIBLE_DOMAIN }}

      - name: Verify doc sync
        run: |
          for p in saifctl saifdocs; do
            f="src/content/docs/${p}/nav.json"
            if [ -f "$f" ]; then
              echo "✓ Doc sync produced $f"
            else
              echo "::error::Doc sync failed — $f missing (run \`npm run sync-docs\` locally and commit, or fix vendor/docs paths)"
              exit 1
            fi
          done

      - name: Verify Plausible in build
        run: |
          if grep -rq "plausible" out/ 2>/dev/null; then
            echo "✓ Plausible script found in build output"
          else
            echo "::error::Plausible not found in build. Ensure NEXT_PUBLIC_PLAUSIBLE_DOMAIN variable is set (e.g. safeaifactory.com)."
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
