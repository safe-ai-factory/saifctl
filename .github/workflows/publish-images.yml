name: Publish Docker Images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/branch/commit to (re)publish images for (e.g. v0.1.0). Synthetic OK in dry-run.'
        required: true
        type: string
      dry_run:
        description: 'Build only; skip push, smoke tests, and GHCR login. Validates the build path without writing to the registry.'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: pnpm run validate

  publish:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: ${{ inputs.dry_run != true }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version tag
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name || inputs.tag }}"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not resolve a version tag from the event payload."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push test runner images (multi-arch)
        run: |
          DRY_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then DRY_FLAG="--dry-run"; fi
          pnpm docker build test --all \
            --push $DRY_FLAG \
            --platforms "${{ env.PLATFORMS }}" \
            --image-prefix "${{ env.IMAGE_PREFIX }}" \
            --extra-tag "${{ steps.version.outputs.version }}"

      - name: Build and push coder images (multi-arch)
        run: |
          DRY_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then DRY_FLAG="--dry-run"; fi
          pnpm docker build coder --all \
            --push $DRY_FLAG \
            --platforms "${{ env.PLATFORMS }}" \
            --image-prefix "${{ env.IMAGE_PREFIX }}" \
            --extra-tag "${{ steps.version.outputs.version }}"

      - name: Smoke test default coder image
        if: ${{ inputs.dry_run != true }}
        run: |
          IMAGE="${{ env.IMAGE_PREFIX }}/saifctl-coder-node-pnpm-python:${{ steps.version.outputs.version }}"
          docker pull --platform linux/amd64 "$IMAGE"
          docker run --rm --platform linux/amd64 --entrypoint /bin/sh "$IMAGE" -c 'node --version && pnpm --version'

      - name: Smoke test default test image
        if: ${{ inputs.dry_run != true }}
        run: |
          IMAGE="${{ env.IMAGE_PREFIX }}/saifctl-test-node-vitest:${{ steps.version.outputs.version }}"
          docker pull --platform linux/amd64 "$IMAGE"
          docker run --rm --platform linux/amd64 --entrypoint /bin/sh "$IMAGE" -c 'node --version'
