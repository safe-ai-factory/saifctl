# Publishes via npm Trusted Publishing (OIDC) — no NPM_TOKEN required.
#
# Bootstrap (one-time, manual): publish v0.1.0 from a local CLI
# (`bash scripts/package.sh && npm publish ./dist-pack/safe-ai-factory-saifctl-0.1.0.tgz --access public`
# — the `./` prefix is required; without it npm misparses the path as a
# GitHub `<owner>/<repo>` shortcut and tries to clone it). Then go to
# npmjs.com → @safe-ai-factory/saifctl → Settings → Trusted Publishers
# and add this repo + this workflow file. After that, every release/tag
# trigger publishes via OIDC, no stored secret.

name: Publish npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)publish for (e.g. v0.1.0)'
        required: true
        type: string

jobs:
  publish:
    name: Build, pack, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm Trusted Publishing (OIDC) + --provenance attestations.
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check (tests, lint, validate)
        run: pnpm run check

      - name: Build and pack
        run: bash scripts/package.sh

      - name: Publish verified tarball to npm (OIDC + provenance)
        # `./` prefix forces file-path interpretation; without it npm matches
        # the `<owner>/<repo>` GitHub shortcut pattern and tries to clone.
        run: npm publish ./dist-pack/safe-ai-factory-saifctl-*.tgz --access public --provenance
